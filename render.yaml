services:
  - type: web
    name: bookkeeping-api
    runtime: node
    plan: free
    buildCommand: cd backend && pnpm install --frozen-lockfile && pnpm build
    startCommand: cd backend && node dist/main.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
